<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohamed Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
margin:0;
font-family:'Cairo',sans-serif;
background:#0f172a;
color:white;
}

header {
display:flex;
justify-content:space-between;
padding:20px 50px;
background:#020617;
position:sticky;
top:0;
}

header h1 {
color:#38bdf8;
}

section {
padding:60px;
text-align:center;
}

h2 {
margin-bottom:30px;
color:#38bdf8;
}

.grid {
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

.grid img {
width:250px;
border-radius:15px;
transition:0.3s;
}

.grid img:hover {
transform:scale(1.05);
}
</style>

</head>

<body>

<header>
<h1>Mohamed</h1>
<div>Graphic Designer</div>
</header>

<section>
<h2>About Me</h2>
<p>أنا جرافيك ديزاينر متخصص في اللوجوهات والسوشيال ميديا والهوية البصرية</p>
</section>

<section>
<h2>Logos</h2>
<div class="grid">
<img src="logo1.jpg">
<img src="logo2.jpg">
</div>
</section>

<section>
<h2>Social Media</h2>
<div class="grid">
<img src="social1.jpg">
<img src="social2.jpg">
</div>
</section>

<section>
<h2>Brand Identity</h2>
<div class="grid">
<img src="brand1.jpg">
<img src="brand2.jpg">
</div>
</section>

</body>
</html>
