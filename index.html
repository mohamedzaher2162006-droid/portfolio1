<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohamed Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 20px 50px;
  position: sticky;
  top: 0;
  background: rgba(2,6,23,0.7);
  backdrop-filter: blur(10px);
}

header h1 {
  color: #38bdf8;
}

nav a {
  margin-left: 20px;
  text-decoration: none;
  color: white;
  transition: 0.3s;
}

nav a:hover {
  color: #38bdf8;
}

.hero {
  height: 80vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.hero h2 {
  font-size: 40px;
}

.hero span {
  color: #38bdf8;
}

section {
  padding: 60px 40px;
}

h3 {
  text-align: center;
  margin-bottom: 40px;
  color: #38bdf8;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  overflow: hidden;
  backdrop-filter: blur(10px);
  transition: 0.4s;
}

.card:hover {
  transform: translateY(-10px) scale(1.02);
}

.card img {
  width: 100%;
}

footer {
  text-align: center;
  padding: 30px;
  opacity: 0.6;
}
</style>

</head>

<body>

<header>
  <h1>Mohamed</h1>
  <nav>
    <a href="#logos">Logos</a>
    <a href="#social">Social</a>
    <a href="#branding">Branding</a>
  </nav>
</header>

<div class="hero">
  <h2>أنا <span>جرافيك ديزاينر</span><br>أصنع هويات بصرية احترافية</h2>
</div>

<section id="logos">
  <h3>Logos</h3>
  <div class="grid">
    <div class="card"><img src="https://via.placeholder.com/400x300"></div>
    <div class="card"><img src="https://via.placeholder.com/400x300"></div>
    <div class="card"><img src="https://via.placeholder.com/400x300"></div>
  </div>
</section>

<section id="social">
  <h3>Social Media</h3>
  <div class="grid">
    <div class="card"><img src="https://via.placeholder.com/400x300"></div>
    <div class="card"><img src="https://via.placeholder.com/400x300"></div>
    <div class="card"><img src="https://via.placeholder.com/400x300"></div>
  </div>
</section>

<section id="branding">
  <h3>Brand Identity</h3>
  <div class="grid">
    <div class="card"><img src="https://via.placeholder.com/400x300"></div>
    <div class="card"><img src="https://via.placeholder.com/400x300"></div>
    <div class="card"><img src="https://via.placeholder.com/400x300"></div>
  </div>
</section>

<footer>
  © 2026 Mohamed Portfolio
</footer>

</body>
</html>
